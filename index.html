<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagom Gestão</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <!-- Sol estilizado -->
      <div class="logo-sun">
        <svg viewBox="0 0 40 40" width="38" height="38" fill="none">
          <circle cx="20" cy="20" r="7" fill="#CBA153"/>
          <g stroke="#CBA153" stroke-width="2" stroke-linecap="round">
            <line x1="20" y1="2"  x2="20" y2="7"/>
            <line x1="20" y1="33" x2="20" y2="38"/>
            <line x1="2"  y1="20" x2="7"  y2="20"/>
            <line x1="33" y1="20" x2="38" y2="20"/>
            <line x1="6.4"  y1="6.4"  x2="9.9"  y2="9.9"/>
            <line x1="30.1" y1="30.1" x2="33.6" y2="33.6"/>
            <line x1="33.6" y1="6.4"  x2="30.1" y2="9.9"/>
            <line x1="9.9"  y1="30.1" x2="6.4"  y2="33.6"/>
          </g>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">LAGOM</span>
        <span class="logo-sub">WEAR</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item" data-route="/estoque">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="3" width="16" height="4" rx="1"/>
          <rect x="2" y="9" width="16" height="4" rx="1"/>
          <rect x="2" y="15" width="16" height="2" rx="1"/>
        </svg>
        <span>Estoque</span>
      </div>
      <div class="nav-item" data-route="/vendas">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M2 3h2l2.4 9.6h8l2-7H6"/>
          <circle cx="8.5" cy="16.5" r="1.5"/>
          <circle cx="14.5" cy="16.5" r="1.5"/>
        </svg>
        <span>Vendas</span>
      </div>
      <div class="nav-item" data-route="/clientes">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="10" cy="6" r="3"/>
          <path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
        </svg>
        <span>Clientes</span>
      </div>
      <div class="nav-item" data-route="/caderninho">
        <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="4" y="2" width="12" height="16" rx="1"/>
          <path d="M7 6h6M7 10h6M7 14h4"/>
        </svg>
        <span>Caderninho</span>
      </div>
    </nav>
  </aside>

  <!-- ===== TOPBAR ===== -->
  <div class="app-shell">
    <header class="topbar">
      <button id="btnMenuToggle" class="btn-icon topbar-toggle" aria-label="Menu">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M3 5h14M3 10h14M3 15h14"/>
        </svg>
      </button>
      <span id="pageTitle" class="topbar-title">Lagom Gestão</span>
      <div class="topbar-actions">
        <button class="btn-icon" title="Perfil">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
            <circle cx="10" cy="6" r="3"/><path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
          </svg>
        </button>
        <button class="btn-icon" title="Conta">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
            <circle cx="10" cy="10" r="3"/>
            <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M15.1 4.9l-1.4 1.4M4.9 15.1l-1.4 1.4"/>
          </svg>
        </button>
        <button class="btn-icon" title="Notificações">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
            <path d="M10 2a6 6 0 0 1 6 6c0 5 2 6 2 6H2s2-1 2-6a6 6 0 0 1 6-6z"/>
            <path d="M8.5 18a1.5 1.5 0 0 0 3 0"/>
          </svg>
        </button>
        <button class="btn-icon" title="Configurações">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
            <circle cx="10" cy="10" r="2.5"/>
            <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M15.1 4.9l-1.4 1.4M4.9 15.1l-1.4 1.4"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== CONTEÚDO PRINCIPAL ===== -->
    <main id="viewContainer" class="view-container">
      <!-- Views são injetadas aqui pelo router -->
    </main>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- App entry point (ES Modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
